---
layout: default
---
<ul class="posts-list">
  
  {% assign category = page.category | default: page.title %}
  {% for post in site.categories[category] %}
    <li>
			{%- assign date_format = "%Y-%m-%d" -%}
			[ {{ post.date | date: date_format }} ] <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title | escape }}</a>
    </li>
  {% endfor %}
  
</ul>
